name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: pre-commit/action@v3.0.1

  build-mac:
    runs-on: macos-latest
    needs: [lint]
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  build:
    runs-on: ${{ matrix.os }}
    needs: [lint]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-22.04-arm]
    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies
      run: sudo apt install libunwind-dev liblzma-dev
      if: runner.os == 'Linux'
    - name: Build
      run: cargo build --verbose --examples --features unwind
    - name: Run tests
      run: cargo test --verbose --features unwind

  build-linux-cross:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        target:
          [
            i686-unknown-linux-musl,
            armv7-unknown-linux-musleabihf,
            aarch64-unknown-linux-musl,
            x86_64-unknown-linux-musl,
          ]
    container:
      image: ghcr.io/benfred/rust-musl-cross:${{ matrix.target }}
      env:
        RUSTUP_HOME: /root/.rustup
        CARGO_HOME: /root/.cargo
    steps:
    - uses: actions/checkout@v6
    - name: Build (unwind)
      run: cargo build --verbose --features unwind --examples
      if: matrix.target == 'x86_64-unknown-linux-musl'  || matrix.target == 'armv7-unknown-linux-musleabihf'
    - name: Build (no-unwind)
      run: cargo build --verbose --examples
      if: matrix.target == 'i686-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'
    # unittests don't compile here - with some duplicate symbol errors.
    # - name: Run tests
    #  run: cargo test --verbose --features unwind
    #  if: matrix.target == 'x86_64-unknown-linux-musl'

  build-freebsd:
    name: Build and test (freebsd-x86_64)
    runs-on: ubuntu-24.04
    needs: [lint]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache cross binary
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cross
          key: ${{ runner.os }}-cross-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cross-

      - name: Install cross
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --rev 51f46f296253d8122c927c5bb933e3c4f27cc317
          cross --version

      - name: Cross-compile test binaries
        run: |
          cross build --release --workspace --all-targets --target x86_64-unknown-freebsd
          cross test --release --no-run --target x86_64-unknown-freebsd

      - name: Run tests in FreeBSD VM
        uses: acj/freebsd-firecracker-action@v0.10.4
        with:
          checkout: true
          verbose: false
          pre-run: |
            include_path="$(mktemp)"
            cat <<EOF > "$include_path"
            target
            target/x86_64-unknown-freebsd
            target/x86_64-unknown-freebsd/release
            target/x86_64-unknown-freebsd/release/deps
            target/x86_64-unknown-freebsd/release/deps/*
            EOF

            rsync -r -e "ssh" \
              --relative \
              --copy-links \
              --include-from "$include_path" \
              --exclude "*" \
              . firecracker:
            rm -f "$include_path"
          run-in-vm: |
            set -e
            env ASSUME_ALWAYS_YES=yes pkg install -y perl5
            set +e

            failed=0
            for testbin in $(find target/x86_64-unknown-freebsd/release/deps -type f -perm -u+x ! -name "*.d" -print); do
              echo "Running $testbin"
              if ! "$testbin"; then
                failed=1
              fi
            done

            if [ "$failed" -ne 0 ]; then
              exit 1
            fi
          post-run: ""

